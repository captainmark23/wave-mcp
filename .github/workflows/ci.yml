name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Compile check
        run: uv run python -m py_compile wave_server.py

      - name: Import check
        run: uv run python -c "import wave_server; print(f'Loaded {len([t for t in dir(wave_server) if t.startswith(\"wave_\")])} tools')"
